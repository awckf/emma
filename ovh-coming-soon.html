<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Emmagpie — Bientôt en ligne</title>
<meta name="description" content="Emmagpie, community manager freelance. Le site arrive très bientôt." />
<meta name="robots" content="noindex" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />

<style>
  :root {
    --color-bg: #ede3d8;
    --color-white: #f8f7f2;
    --color-text: #0a0405;
    --color-text-soft: #272626;
    --color-primary: #862043;
    --color-primary-dark: #6b1a36;
    --color-accent: #d3b2b3;
    --font-heading: "Fraunces", serif;
    --font-body: "Nunito Sans", sans-serif;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: var(--color-bg);
    color: var(--color-text);
    font-family: var(--font-body);
    padding: 2rem 1.5rem;
  }

  .badge {
    width: clamp(140px, 20vw, 190px);
    height: auto;
    margin-bottom: 2rem;
    filter: drop-shadow(0 12px 24px rgba(10, 4, 5, 0.15));
  }

  .eyebrow {
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 0.8rem;
    color: var(--color-primary-dark);
    margin-bottom: 0.75rem;
  }

  h1 {
    font-family: var(--font-heading);
    font-weight: 600;
    font-size: clamp(2rem, 5vw, 3rem);
    line-height: 1.2;
    max-width: 18ch;
    margin-bottom: 1.25rem;
  }

  p.lead {
    color: var(--color-text-soft);
    font-size: 1.1rem;
    max-width: 42ch;
    margin-bottom: 2.5rem;
  }

  .contact-line {
    font-size: 0.95rem;
    color: var(--color-text-soft);
    margin-bottom: 2rem;
  }

  .contact-line a {
    color: var(--color-primary-dark);
    font-weight: 700;
    text-decoration: none;
  }

  .contact-line a:hover {
    text-decoration: underline;
  }

  .social {
    display: flex;
    gap: 1.2rem;
  }

  .social a {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: var(--color-white);
    color: var(--color-primary-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 20px rgba(10, 4, 5, 0.08);
    transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
  }

  .social a:hover {
    background: var(--color-primary);
    color: var(--color-white);
    transform: translateY(-3px);
  }

  footer {
    margin-top: 3rem;
    font-size: 0.8rem;
    color: var(--color-text-soft);
    opacity: 0.7;
  }
</style>
</head>

  <img class="badge" src="assets/images/logo/logo-badge.png" alt="Logo Emmagpie" onerror="this.style.display='none'" />

    <a href="mailto:emmagpie.cm@gmail.com">emmagpie.cm@gmail.com</a>
